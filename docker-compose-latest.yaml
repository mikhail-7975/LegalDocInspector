version: '3.8'

services:
  flask_app:
    build:
      context: ./
      dockerfile: Dockerfile_flask_app
    container_name: flask_app
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - TRANSFORMERS_CACHE=/app/huggingface
    volumes:
      - huggingface_cache:/app/huggingface
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # For GPU access
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  streamlit_app:
    build:
      context: ./streamlit
      dockerfile: Dockerfile_streamlit_app
    container_name: streamlit_app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - FLASK_API_URL=http://flask_app:5001
    depends_on:
      flask_app:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  app_network:
    driver: bridge
    name: ml_app_network

volumes:
  huggingface_cache:
    driver: local
